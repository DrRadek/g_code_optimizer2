<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimalizace Orientace 3D Tisku — Pipeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap');

  /* ── DARK THEME (default) ── */
  :root{
    --bg:#0a0c0f;--surface:#111318;--surface2:#181c24;
    --border:#252a35;--accent:#00b8d9;--accent2:#e05a20;
    --green:#00cc6a;--red:#ff3b5c;--text:#e0e6f0;--text-dim:#5a6480;
    --canvas-bg:#0d1117;--grid:#12181f;--bbox-line:#252a35;
    --plate:#1a2030;--plate-stroke:#1e2530;
    --ctrl-bg:#181c24;--ctrl-border:#252a35;--ctrl-text:#8892aa;
    --toggle-bg:#252a35;--toggle-active:#00b8d9;--toggle-knob:#fff;
    --font-ui:'JetBrains Mono',monospace;
    --font-head:'Syne',sans-serif;
  }

  /* ── LIGHT THEME ── */
  body.light{
    --bg:#f4f1eb;--surface:#ffffff;--surface2:#f0ede6;
    --border:#d4cfc4;--accent:#0055aa;--accent2:#a83200;
    --green:#0f6b2a;--red:#b01a0a;--text:#1a1a1a;--text-dim:#7a7060;
    --canvas-bg:#faf8f4;--grid:#ede9e0;--bbox-line:#c8c0b0;
    --plate:#ddd8cc;--plate-stroke:#c8c0b0;
    --ctrl-bg:#ede9e0;--ctrl-border:#d4cfc4;--ctrl-text:#5a5040;
    --toggle-bg:#d4cfc4;--toggle-active:#0055aa;--toggle-knob:#fff;
    --font-ui:'JetBrains Mono',monospace;
    --font-head:'Source Serif 4',serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;overflow-x:auto;transition:background .25s,color .25s;}

  /* ── HEADER ── */
  header{padding:16px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  header h1{font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:.04em;color:var(--accent);flex:1;min-width:200px;}
  header .sub{font-size:11px;color:var(--text-dim);letter-spacing:.08em;flex:1;}

  /* ── CONTROLS ── */
  .controls{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .ctrl-group{display:flex;align-items:center;gap:8px;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:20px;padding:5px 12px;}
  .ctrl-label{font-size:10px;color:var(--ctrl-text);letter-spacing:.08em;text-transform:uppercase;user-select:none;}
  .toggle{position:relative;width:36px;height:20px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;position:absolute;}
  .toggle-track{position:absolute;inset:0;background:var(--toggle-bg);border-radius:10px;transition:background .2s;}
  .toggle input:checked~.toggle-track{background:var(--toggle-active);}
  .toggle-knob{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--toggle-knob);border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle input:checked~.toggle-track~.toggle-knob,
  .toggle input:checked+.toggle-track+.toggle-knob{transform:translateX(16px);}
  /* workaround: knob is sibling */
  .toggle{display:flex;align-items:center;}
  .toggle input{position:absolute;opacity:0;width:0;height:0;}
  .tslider{position:relative;width:36px;height:20px;display:inline-block;flex-shrink:0;}
  .tslider input{opacity:0;width:0;height:0;}
  .ttrack{position:absolute;inset:0;background:var(--toggle-bg);border-radius:10px;transition:background .2s;cursor:pointer;}
  .tknob{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--toggle-knob);border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  input:checked~.ttrack{background:var(--toggle-active);}
  input:checked~.tknob{transform:translateX(16px);}
  .lang-label{font-size:11px;font-weight:600;color:var(--text-dim);min-width:18px;text-align:center;}

  /* ── PIPELINE ── */
  .pipeline{display:flex;align-items:flex-start;padding:32px 40px;overflow-x:auto;min-width:max-content;}
  .box{flex-shrink:0;width:260px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:background .25s,border-color .25s;}
  .box.narrow{width:220px;}
  .box-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2);}
  .box-num{width:20px;height:20px;border-radius:4px;background:var(--accent);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  body.light .box-num{color:#fff;}
  .box-num.alt{background:var(--accent2);}
  .box-num.grn{background:var(--green);color:#fff;}
  body.light .box-num.grn{color:#fff;}
  .box-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--text);text-transform:uppercase;}
  .box-body{padding:12px;}
  canvas{display:block;border-radius:4px;background:var(--canvas-bg);border:1px solid var(--border);}
  .hint{font-size:10px;color:var(--text-dim);margin-top:7px;letter-spacing:.04em;line-height:1.5;}
  .vdisplay{background:var(--canvas-bg);border:1px solid var(--border);border-radius:4px;padding:7px 12px;font-size:11px;color:var(--accent);margin-top:8px;}
  .vdisplay span{color:var(--text-dim);font-size:10px;}
  .fval{background:var(--canvas-bg);border:1px solid var(--green);border-radius:6px;padding:14px;text-align:center;margin-bottom:8px;}
  .fval .lbl{font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
  .fval .num{font-size:26px;font-weight:600;color:var(--green);font-family:var(--font-head);}
  .fval.alt{border-color:var(--accent2);}
  .fval.alt .num{color:var(--accent2);}
  .split-group{display:flex;flex-direction:column;gap:14px;}
  .cam-angle{font-size:10px;color:var(--text-dim);margin-top:6px;}
  .cam-angle strong{color:var(--accent);font-size:12px;}
  .diff-note{font-size:10px;color:var(--text-dim);margin-top:8px;line-height:1.6;}
  .diff-note b{color:var(--accent2);}
</style>
</head>

<script>
// =============================================
// TRANSLATIONS
// =============================================
const T = {
  cs: {
    htmlLang:'cs',
    pageTitle:'Optimalizace Orientace 3D Tisku — Pipeline',
    hTitle:'OPTIMALIZACE ORIENTACE',
    hSub:'3D TISK — INTERAKTIVNÍ VIZUALIZACE VÝPOČTU OBJEMU PODPOR',
    themeLabel:'tmavý', themeLabel2:'světlý',
    b1title:'Prostor modelu',    b1hint:'↺ Táhněte oranžový bod pro rotaci kamery',
    b2title:'Prostor pohledu',   b2hint:'Kamera fixována nahoře — model rotuje',
    b3title:'Ohraničující box',  b3hint:'Hranice paprsků — ortografická projekce',
    b4atitle:'Rasterizace',
    b4ahint:'Kamera nahoře → paprsky dolů\nZelená = výška podpěrného sloupce (zásah → spodek boxu)',
    b4btitle:'Sledování paprsků',
    b4bhint:'Kamera nahoře → paprsky dolů\n● vstup do modelu ignorován  ● vnější mezery = podpora',
    b5title:'Výšky sloupců',
    b5ahint:'Rasterizér — výška podpěry na paprsek',
    b5bhint:'Sledování paprsků — výška podpěry na paprsek',
    b6atitle:'Integrace (Raster)',
    b6btitle:'Integrace (RTX)',
    b6hint:'Δx·(h[i]+h[i+1])/2 na interval',
    b7title:'Výsledek',
    rasterVol:'Objem podpěr (raster)',
    rtxVol:'Objem podpěr (RTX)',
    diffNote:'≈ objem modelu (konstantní)\nObě metody řadí orientace shodně',
    angleLabel:'Úhel kamery:',
    camLabel:'▼ Kamera',
    entryLabel:'● vstup', supportLabel:'█ sloupec podpory',
    integLabel: (v) => `∫ = ${v}`,
  },
  en: {
    htmlLang:'en',
    pageTitle:'3D Print Orientation Optimizer — Pipeline',
    hTitle:'ORIENTATION OPTIMIZER',
    hSub:'3D PRINT SUPPORT VOLUME PIPELINE — INTERACTIVE DEMO',
    themeLabel:'dark', themeLabel2:'light',
    b1title:'Model Space',      b1hint:'↺ Drag the orange handle to rotate camera',
    b2title:'View Space',       b2hint:'Camera fixed at top — model rotated',
    b3title:'Bounding Box',     b3hint:'Ray bounds — orthographic projection',
    b4atitle:'Rasterization',
    b4ahint:'Camera at top → rays downward\nGreen = support column height (hit → bbox bottom)',
    b4btitle:'Ray Tracing',
    b4bhint:'Camera at top → rays downward\n● model entry ignored  ● exterior gaps = support',
    b5title:'Column Heights',
    b5ahint:'Rasterizer — support column per ray',
    b5bhint:'Ray tracer — support column per ray',
    b6atitle:'Integration (Raster)',
    b6btitle:'Integration (RTX)',
    b6hint:'Δx·(h[i]+h[i+1])/2 per interval',
    b7title:'Result',
    rasterVol:'Raster volume',
    rtxVol:'RTX volume',
    diffNote:'≈ model volume (constant)\nBoth rank orientations identically',
    angleLabel:'Camera angle:',
    camLabel:'▼ Camera',
    entryLabel:'● entry', supportLabel:'█ support col.',
    integLabel: (v) => `∫ = ${v}`,
  }
};

let lang = 'cs';
let theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';

function applyTranslations() {
  const t = T[lang];
  document.documentElement.lang = t.htmlLang;
  document.title = t.pageTitle;
  document.getElementById('h-title').textContent = t.hTitle;
  document.getElementById('h-sub').textContent = t.hSub;
  document.getElementById('theme-label').textContent = t.themeLabel;
  document.getElementById('theme-label2').textContent = t.themeLabel2;
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] !== undefined && typeof t[key] === 'string') {
      // preserve inner HTML for hints with colored spans
      el.textContent = t[key];
    }
  });
  // special: b4bhint has colored dots — set manually
  document.querySelectorAll('[data-t="b4bhint"]').forEach(el => {
    el.innerHTML = lang === 'cs'
      ? 'Kamera nahoře → paprsky dolů<br><span style="color:var(--red)">●</span> vstup do modelu ignorován &nbsp;<span style="color:var(--green)">●</span> vnější mezery = podpora'
      : 'Camera at top → rays downward<br><span style="color:var(--red)">●</span> model entry ignored &nbsp;<span style="color:var(--green)">●</span> exterior gaps = support';
  });
  document.querySelectorAll('[data-t="b4ahint"]').forEach(el => {
    el.innerHTML = lang === 'cs'
      ? 'Kamera nahoře → paprsky dolů<br>Zelená = výška podpěrného sloupce (zásah → spodek boxu)'
      : 'Camera at top → rays downward<br>Green = support column height (hit → bbox bottom)';
  });
  document.querySelectorAll('[data-t="diffNote"]').forEach(el => {
    el.innerHTML = lang === 'cs'
      ? '≈ objem modelu (konstantní)<br>Obě metody řadí orientace shodně'
      : '≈ model volume (constant)<br>Both rank orientations identically';
  });
}

function applyTheme() {
  document.body.classList.toggle('light', theme === 'light');
  // redraw canvases with new theme colors
  update();
}

document.getElementById('lang-toggle').addEventListener('change', e => {
  lang = e.target.checked ? 'en' : 'cs';
  applyTranslations();
  update();
});
document.getElementById('theme-toggle').addEventListener('change', e => {
  theme = e.target.checked ? 'light' : 'dark';
  applyTheme();
});

// =============================================
// THEME-AWARE COLOR HELPERS
// =============================================
function css(v){ return getComputedStyle(document.body).getPropertyValue(v).trim(); }
function themeColors(){
  return {
    bg:      css('--canvas-bg'),
    grid:    css('--grid'),
    border:  css('--border'),
    accent:  css('--accent'),
    accent2: css('--accent2'),
    green:   css('--green'),
    red:     css('--red'),
    text:    css('--text'),
    dim:     css('--text-dim'),
    plate:   css('--plate'),
    plateStroke: css('--plate-stroke'),
    bboxLine:css('--bbox-line'),
  };
}

// =============================================
// RENDER SCALE — increase for high-res screenshots (e.g. 2 or 3)
// =============================================
const RENDER_SCALE = 2;

// =============================================
// MODEL & MATH
// =============================================
const MODEL_VERTS=[[-0.72,-0.72],[0.72,-0.72],[0.72,0.72],[0.38,0.72],[0.38,-0.22],[-0.38,-0.22],[-0.38,0.72],[-0.72,0.72]];
const NUM_SAMPLES=14;
let cameraAngle=0,dragging=false;

function rot(x,y,a){return[Math.cos(a)*x-Math.sin(a)*y,Math.sin(a)*x+Math.cos(a)*y];}
function tv(v,a){return v.map(([x,y])=>rot(x,y,a));}
function bbof(v){let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;for(const[x,y]of v){x0=Math.min(x0,x);x1=Math.max(x1,x);y0=Math.min(y0,y);y1=Math.max(y1,y);}return{minX:x0,maxX:x1,minY:y0,maxY:y1,w:x1-x0,h:y1-y0};}

function yhits(verts,x){
  const h=[];const n=verts.length;
  for(let j=0;j<n;j++){
    const[x0,y0]=verts[j],[x1,y1]=verts[(j+1)%n];
    if((x0<x&&x<=x1)||(x1<x&&x<=x0))h.push(y0+(x-x0)/(x1-x0)*(y1-y0));
  }
  return h.sort((a,b)=>b-a);
}

function rayXPositions(bb,n){
  const eps=bb.w*1e-6;
  return Array.from({length:n},(_,i)=>bb.minX+eps+i/(n-1)*(bb.w-2*eps));
}

function depthsRaster(rv,bb,n){
  const xs=rayXPositions(bb,n);
  return xs.map(x=>{const h=yhits(rv,x);return h.length>=1?Math.max(0,h[0]-bb.minY):0;});
}

function depthsRTX(rv,bb,n){
  const xs=rayXPositions(bb,n);
  return xs.map(x=>{
    const h=yhits(rv,x);
    if(h.length<2)return 0;
    let depth=0;
    for(let k=1;k<h.length;k++){if(k%2===0)depth+=h[k-1]-h[k];}
    const outsideBelow=(h.length%2===0);
    if(outsideBelow)depth+=h[h.length-1]-bb.minY;
    return Math.max(0,depth);
  });
}

function trapInt(depths,bb){
  const dx=bb.w/(depths.length-1);
  let s=0;for(let i=0;i<depths.length-1;i++)s+=(depths[i]+depths[i+1])/2*dx;
  return s;
}

const INITIAL_BB=bbof(MODEL_VERTS);
const PLOT_MAX=Math.sqrt(INITIAL_BB.w*INITIAL_BB.w+INITIAL_BB.h*INITIAL_BB.h);

// =============================================
// CANVAS HELPERS
// =============================================
function clr(ctx,w,h,c){ctx.fillStyle=c||css('--canvas-bg');ctx.fillRect(0,0,w,h);}
function grd(ctx,w,h){
  const g=css('--grid');
  ctx.strokeStyle=g;ctx.lineWidth=1;
  for(let x=0;x<w;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
}
function m2c(x,y,cx,cy,sc){return[cx+x*sc,cy-y*sc];}
function dpoly(ctx,v,cx,cy,sc,fill,stroke){
  ctx.beginPath();const[sx,sy]=m2c(v[0][0],v[0][1],cx,cy,sc);ctx.moveTo(sx,sy);
  for(let i=1;i<v.length;i++){const[px,py]=m2c(v[i][0],v[i][1],cx,cy,sc);ctx.lineTo(px,py);}
  ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
}
function darrow(ctx,x1,y1,x2,y2,col){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=col;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-8*Math.cos(a-.35),y2-8*Math.sin(a-.35));
  ctx.lineTo(x2-8*Math.cos(a+.35),y2-8*Math.sin(a+.35));
  ctx.closePath();ctx.fill();
}
function fit(bb,W,H,px,py){const sc=Math.min((W-px*2)/bb.w,(H-py*2)/bb.h)*.88;return{sc,cx:W/2-(bb.minX+bb.w/2)*sc,cy:H/2+(bb.minY+bb.h/2)*sc};}
function h2r(h,a){
  h=h.trim();
  if(h.startsWith('rgb')){const m=h.match(/[\d.]+/g);return`rgba(${m[0]},${m[1]},${m[2]},${a})`;}
  if(h.startsWith('#')&&h.length===7){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
  return h;
}

// SVG connectors
function svline(svg,x1,y1,x2,y2){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('stroke',css('--border'));l.setAttribute('stroke-width','2');svg.appendChild(l);}
function svarrow(svg,x,y){const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');p.setAttribute('points',`${x-8},${y-4} ${x},${y} ${x-8},${y+4}`);p.setAttribute('fill',css('--border'));svg.appendChild(p);}

// =============================================
// DRAW FUNCTIONS
// =============================================
const c1=document.getElementById('c-model'),ctx1=c1.getContext('2d');
// Logical (CSS) sizes — captured before any render scale is applied
const LW={};
document.querySelectorAll('canvas').forEach(c=>{ LW[c.id]={w:c.width,h:c.height}; });
const W1=LW['c-model'].w,H1=LW['c-model'].h,CX1=W1/2,CY1=H1/2+10,SC1=90,CR=92;

function drawModel(){
  const C=themeColors();
  clr(ctx1,W1,H1,C.bg);grd(ctx1,W1,H1);
  dpoly(ctx1,MODEL_VERTS,CX1,CY1,SC1,h2r(C.accent,.07),C.accent);
  // plate directly below model bottom
  const[,bpy]=m2c(0,Math.min(...MODEL_VERTS.map(v=>v[1])),CX1,CY1,SC1);
  ctx1.fillStyle=C.plate;ctx1.fillRect(10,bpy+2,W1-20,8);
  ctx1.strokeStyle=C.plateStroke;ctx1.lineWidth=1;ctx1.beginPath();ctx1.moveTo(10,bpy+2);ctx1.lineTo(W1-10,bpy+2);ctx1.stroke();
  const hx=Math.sin(cameraAngle)*CR,hy=-Math.cos(cameraAngle)*CR;
  const cx2=CX1+hx,cy2=CY1+hy;
  ctx1.strokeStyle=h2r(C.accent2,.3);ctx1.lineWidth=1;ctx1.setLineDash([4,4]);
  ctx1.beginPath();ctx1.moveTo(CX1,CY1);ctx1.lineTo(cx2,cy2);ctx1.stroke();ctx1.setLineDash([]);
  darrow(ctx1,CX1,CY1,cx2,cy2,C.accent2);
  ctx1.beginPath();ctx1.arc(cx2,cy2,9,0,Math.PI*2);ctx1.fillStyle=C.accent2;ctx1.fill();
  ctx1.strokeStyle='rgba(255,255,255,0.2)';ctx1.lineWidth=1;ctx1.stroke();
  ctx1.fillStyle='#fff';ctx1.font='9px JetBrains Mono';ctx1.textAlign='center';ctx1.textBaseline='middle';ctx1.fillText('C',cx2,cy2);
  ctx1.textAlign='left';ctx1.textBaseline='alphabetic';
  ctx1.fillStyle=C.accent2;ctx1.font='9px JetBrains Mono';ctx1.fillText(T[lang].camLabel.replace('▼ ',''),cx2+12,cy2-4);
}

const c2=document.getElementById('c-view'),ctx2=c2.getContext('2d');
function drawView(rv){
  const C=themeColors();const{w,h}=LW['c-view'];
  clr(ctx2,w,h,C.bg);grd(ctx2,w,h);
  const bb=bbof(rv),{sc,cx,cy}=fit(bb,w,h,20,28);
  const[,bpy]=m2c(0,bb.minY,cx,cy,sc);
  ctx2.fillStyle=C.plate;ctx2.fillRect(10,bpy+2,w-20,8);
  dpoly(ctx2,rv,cx,cy,sc,h2r(C.accent,.07),C.accent);
  const[,ty]=m2c(0,bb.maxY,cx,cy,sc);
  ctx2.fillStyle=C.accent2;ctx2.font='9px JetBrains Mono';ctx2.textAlign='center';
  ctx2.fillText(T[lang].camLabel,w/2,ty-6);
  ctx2.textAlign='left';
}

const c3=document.getElementById('c-bbox'),ctx3=c3.getContext('2d');
function drawBB(rv){
  const C=themeColors();const{w,h}=LW['c-bbox'];
  clr(ctx3,w,h,C.bg);grd(ctx3,w,h);
  const bb=bbof(rv),{sc,cx,cy}=fit(bb,w,h,20,28);
  dpoly(ctx3,rv,cx,cy,sc,h2r(C.accent,.07),C.accent);
  const[bx0,by0]=m2c(bb.minX,bb.maxY,cx,cy,sc),[bx1,by1]=m2c(bb.maxX,bb.minY,cx,cy,sc);
  ctx3.strokeStyle=C.accent2;ctx3.lineWidth=1;ctx3.setLineDash([4,3]);
  ctx3.strokeRect(bx0,by0,bx1-bx0,by1-by0);ctx3.setLineDash([]);
  ctx3.fillStyle=C.accent2;ctx3.font='9px JetBrains Mono';
  ctx3.fillText(`w=${bb.w.toFixed(2)}`,bx0+3,by1+13);ctx3.fillText(`h=${bb.h.toFixed(2)}`,bx1+4,(by0+by1)/2+4);
  document.getElementById('bbox-display').innerHTML=`<span>w</span> ${bb.w.toFixed(3)} &nbsp;<span>h</span> ${bb.h.toFixed(3)}`;
}

const c4a=document.getElementById('c-raster'),ctx4a=c4a.getContext('2d');
function drawRaster(rv,bb){
  const C=themeColors();const{w,h}=LW['c-raster'];
  clr(ctx4a,w,h,C.bg);grd(ctx4a,w,h);
  const{sc,cx,cy}=fit(bb,w,h,14,22);
  dpoly(ctx4a,rv,cx,cy,sc,h2r(C.accent,.07),C.accent);
  const[bx0,by0]=m2c(bb.minX,bb.maxY,cx,cy,sc),[bx1,by1]=m2c(bb.maxX,bb.minY,cx,cy,sc);
  ctx4a.strokeStyle=h2r(C.accent2,.2);ctx4a.lineWidth=1;ctx4a.setLineDash([3,3]);
  ctx4a.strokeRect(bx0,by0,bx1-bx0,by1-by0);ctx4a.setLineDash([]);
  const xs=rayXPositions(bb,NUM_SAMPLES);
  for(const x of xs){
    const[cxr]=m2c(x,0,cx,cy,sc);
    const[,rTop]=m2c(0,bb.maxY,cx,cy,sc),[,rBot]=m2c(0,bb.minY,cx,cy,sc);
    const h=yhits(rv,x);
    if(h.length>=1){
      const[,tsY]=m2c(0,h[0],cx,cy,sc);
      ctx4a.strokeStyle=h2r(C.accent2,.35);ctx4a.lineWidth=1;
      ctx4a.beginPath();ctx4a.moveTo(cxr,rTop);ctx4a.lineTo(cxr,tsY);ctx4a.stroke();
      ctx4a.beginPath();ctx4a.arc(cxr,tsY,2.5,0,Math.PI*2);ctx4a.fillStyle=C.red;ctx4a.fill();
      ctx4a.strokeStyle=C.green;ctx4a.lineWidth=theme==='dark'?1.5:2.5;
      ctx4a.beginPath();ctx4a.moveTo(cxr,tsY);ctx4a.lineTo(cxr,rBot);ctx4a.stroke();
    } else {
      ctx4a.strokeStyle=h2r(C.dim,.3);ctx4a.lineWidth=1;
      ctx4a.beginPath();ctx4a.moveTo(cxr,rTop);ctx4a.lineTo(cxr,rBot);ctx4a.stroke();
    }
  }
  ctx4a.fillStyle=C.accent2;ctx4a.font='9px JetBrains Mono';ctx4a.textAlign='center';
  ctx4a.fillText(T[lang].camLabel,w/2,10);ctx4a.textAlign='left';
  ctx4a.fillStyle=C.red;ctx4a.fillText(T[lang].entryLabel,6,h-12);
  ctx4a.fillStyle=C.green;ctx4a.fillText(T[lang].supportLabel,60,h-12);
}

const c4b=document.getElementById('c-rtx'),ctx4b=c4b.getContext('2d');
function drawRTX(rv,bb){
  const C=themeColors();const{w,h}=LW['c-rtx'];
  clr(ctx4b,w,h,C.bg);grd(ctx4b,w,h);
  const{sc,cx,cy}=fit(bb,w,h,14,22);
  dpoly(ctx4b,rv,cx,cy,sc,h2r(C.accent,.07),C.accent);
  const[bx0,by0]=m2c(bb.minX,bb.maxY,cx,cy,sc),[bx1,by1]=m2c(bb.maxX,bb.minY,cx,cy,sc);
  ctx4b.strokeStyle=h2r(C.accent2,.2);ctx4b.lineWidth=1;ctx4b.setLineDash([3,3]);
  ctx4b.strokeRect(bx0,by0,bx1-bx0,by1-by0);ctx4b.setLineDash([]);
  const xs=rayXPositions(bb,NUM_SAMPLES);
  for(const x of xs){
    const[cxr]=m2c(x,0,cx,cy,sc);
    const[,rTop]=m2c(0,bb.maxY,cx,cy,sc),[,rBot]=m2c(0,bb.minY,cx,cy,sc);
    const h=yhits(rv,x);
    if(h.length===0){ctx4b.strokeStyle=h2r(C.dim,.15);ctx4b.lineWidth=1;ctx4b.beginPath();ctx4b.moveTo(cxr,rTop);ctx4b.lineTo(cxr,rBot);ctx4b.stroke();continue;}
    const[,h0y]=m2c(0,h[0],cx,cy,sc);
    ctx4b.strokeStyle=h2r(C.accent2,.35);ctx4b.lineWidth=1;
    ctx4b.beginPath();ctx4b.moveTo(cxr,rTop);ctx4b.lineTo(cxr,h0y);ctx4b.stroke();
    ctx4b.beginPath();ctx4b.arc(cxr,h0y,3,0,Math.PI*2);ctx4b.fillStyle=C.red;ctx4b.fill();
    for(let k=1;k<h.length;k++){
      const[,hy]=m2c(0,h[k],cx,cy,sc),[,hpy]=m2c(0,h[k-1],cx,cy,sc);
      const inside=(k%2===1);
      ctx4b.strokeStyle=inside?h2r(C.dim,.3):C.green;
      ctx4b.lineWidth=inside?1:theme==='dark'?1.5:2.5;
      ctx4b.beginPath();ctx4b.moveTo(cxr,hpy);ctx4b.lineTo(cxr,hy);ctx4b.stroke();
      ctx4b.beginPath();ctx4b.arc(cxr,hy,2.5,0,Math.PI*2);
      ctx4b.fillStyle=inside?C.red:C.green;ctx4b.fill();
    }
    const lk=h.length-1;const[,lhy]=m2c(0,h[lk],cx,cy,sc);
    const ob=(lk%2===1);
    ctx4b.strokeStyle=ob?C.green:h2r(C.dim,.15);ctx4b.lineWidth=ob?(theme==='dark'?1.5:2.5):1;
    ctx4b.beginPath();ctx4b.moveTo(cxr,lhy);ctx4b.lineTo(cxr,rBot);ctx4b.stroke();
  }
  ctx4b.fillStyle=C.accent2;ctx4b.font='9px JetBrains Mono';ctx4b.textAlign='center';
  ctx4b.fillText(T[lang].camLabel,w/2,10);ctx4b.textAlign='left';
}

function drawLinePlot(ctx,W,H,depths,col,maxD){
  const C=themeColors();
  clr(ctx,W,H,C.bg);
  const padX=12,padY=8,plotW=W-padX*2,plotH=H-padY*2;
  ctx.strokeStyle=C.bboxLine;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padX,padY);ctx.lineTo(padX,H-padY);ctx.lineTo(W-padX,H-padY);ctx.stroke();
  ctx.strokeStyle=C.bboxLine;ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(padX,padY);ctx.lineTo(W-padX,padY);ctx.stroke();
  ctx.setLineDash([]);
  if(depths.every(d=>d===0)){
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.moveTo(padX,H-padY);ctx.lineTo(W-padX,H-padY);ctx.stroke();
    ctx.globalAlpha=1;return;
  }
  const n=depths.length;
  ctx.beginPath();ctx.moveTo(padX,H-padY);
  for(let i=0;i<n;i++){const x=padX+i/(n-1)*plotW,y=H-padY-(depths[i]/maxD)*plotH;ctx.lineTo(x,y);}
  ctx.lineTo(W-padX,H-padY);ctx.closePath();
  ctx.fillStyle=h2r(col,.13);ctx.fill();
  ctx.beginPath();
  for(let i=0;i<n;i++){const x=padX+i/(n-1)*plotW,y=H-padY-(depths[i]/maxD)*plotH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  for(let i=0;i<n;i++){const x=padX+i/(n-1)*plotW,y=H-padY-(depths[i]/maxD)*plotH;ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();}
}

function drawInteg(ctx,W,H,depths,bb,col,maxD){
  const C=themeColors();
  clr(ctx,W,H,C.bg);
  const avgs=[];for(let i=0;i<depths.length-1;i++)avgs.push((depths[i]+depths[i+1])/2);
  const padX=12,padY=8,botP=18,plotW=W-padX*2,plotH=H-padY-botP;
  ctx.strokeStyle=C.bboxLine;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padX,padY);ctx.lineTo(padX,H-botP);ctx.lineTo(W-padX,H-botP);ctx.stroke();
  ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(padX,padY);ctx.lineTo(W-padX,padY);ctx.stroke();
  ctx.setLineDash([]);
  if(avgs.every(d=>d===0)){
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.moveTo(padX,H-botP);ctx.lineTo(W-padX,H-botP);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=col;ctx.font='10px JetBrains Mono';ctx.fillText(T[lang].integLabel('0.0000'),padX+2,H-4);
    return;
  }
  const n=avgs.length,sw=plotW/n;
  for(let i=0;i<n;i++){
    const x0=padX+i*sw,bh=(avgs[i]/maxD)*plotH,y0=H-botP-bh;
    ctx.fillStyle=h2r(col,.13);ctx.fillRect(x0,y0,sw,bh);
    ctx.strokeStyle=col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0+sw,y0);ctx.stroke();
    if(i>0){const ph=(avgs[i-1]/maxD)*plotH,py=H-botP-ph;ctx.beginPath();ctx.moveTo(x0,py);ctx.lineTo(x0,y0);ctx.stroke();}
    ctx.beginPath();ctx.arc(x0+sw/2,y0,2.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  }
  const integral=trapInt(depths,bb);
  ctx.fillStyle=col;ctx.font='10px JetBrains Mono';
  ctx.fillText(T[lang].integLabel(integral.toFixed(4)),padX+2,H-4);
}

// =============================================
// CONNECTORS
// =============================================
function centerOf(el){const pr=document.getElementById('pipeline').getBoundingClientRect(),er=el.getBoundingClientRect();return er.top-pr.top+er.height/2;}
function simpleSV(svgEl,b1,b2){const y=(centerOf(b1)+centerOf(b2))/2;svgEl.setAttribute('height',Math.max(y+10,20));svgEl.innerHTML='';svline(svgEl,0,y,28,y);svarrow(svgEl,32,y);}
function buildConnectors(){
  simpleSV(document.getElementById('sv12'),document.getElementById('b1'),document.getElementById('b2'));
  simpleSV(document.getElementById('sv23'),document.getElementById('b2'),document.getElementById('b3'));
  {const sv=document.getElementById('sv-split');
  const y3=centerOf(document.getElementById('b3')),y4a=centerOf(document.getElementById('b4a')),y4b=centerOf(document.getElementById('b4b'));
  const H=Math.max(y3,y4a,y4b)+10;sv.setAttribute('height',H);sv.innerHTML='';
  svline(sv,0,y3,16,y3);svline(sv,16,Math.min(y4a,y3),16,Math.max(y4b,y3));
  svline(sv,16,y4a,32,y4a);svarrow(sv,32,y4a);svline(sv,16,y4b,32,y4b);svarrow(sv,32,y4b);}
  {const sv=document.getElementById('sv-mid');
  const y4a=centerOf(document.getElementById('b4a')),y4b=centerOf(document.getElementById('b4b'));
  const H=Math.max(y4a,y4b)+10;sv.setAttribute('height',H);sv.innerHTML='';
  svline(sv,0,y4a,28,y4a);svarrow(sv,32,y4a);svline(sv,0,y4b,28,y4b);svarrow(sv,32,y4b);}
  {const sv=document.getElementById('sv-mid2');
  const y5a=centerOf(document.getElementById('b5a')),y5b=centerOf(document.getElementById('b5b'));
  const H=Math.max(y5a,y5b)+10;sv.setAttribute('height',H);sv.innerHTML='';
  svline(sv,0,y5a,28,y5a);svarrow(sv,32,y5a);svline(sv,0,y5b,28,y5b);svarrow(sv,32,y5b);}
  {const sv=document.getElementById('sv-merge');
  const y6a=centerOf(document.getElementById('b6a')),y6b=centerOf(document.getElementById('b6b')),y7=centerOf(document.getElementById('b7'));
  const mid=(y6a+y6b)/2;const H=Math.max(y6a,y6b,y7)+10;sv.setAttribute('height',H);sv.innerHTML='';
  svline(sv,0,y6a,16,y6a);svline(sv,0,y6b,16,y6b);svline(sv,16,y6a,16,y6b);svline(sv,16,mid,32,y7);svarrow(sv,32,y7);}
}

function alignRows(){
  const items=['b1','b2','b3','sg4','sg5','sg6','b7'].map(id=>document.getElementById(id));
  items.forEach(el=>el.style.marginTop='0');
  const heights=items.map(el=>el.getBoundingClientRect().height);
  const maxH=Math.max(...heights);
  items.forEach((el,i)=>{el.style.marginTop=Math.round((maxH-heights[i])/2)+'px';});
}

// =============================================
// UPDATE
// =============================================
function update(){
  const C=themeColors();
  const rv=tv(MODEL_VERTS,cameraAngle);
  const bb=bbof(rv);
  const dr=depthsRaster(rv,bb,NUM_SAMPLES);
  const dt=depthsRTX(rv,bb,NUM_SAMPLES);
  const ir=trapInt(dr,bb),it=trapInt(dt,bb);

  drawModel();drawView(rv);drawBB(rv);
  drawRaster(rv,bb);drawRTX(rv,bb);
  drawLinePlot(document.getElementById('c-plot-raster').getContext('2d'),LW['c-plot-raster'].w,LW['c-plot-raster'].h,dr,C.accent,PLOT_MAX);
  drawLinePlot(document.getElementById('c-plot-rtx').getContext('2d'),LW['c-plot-rtx'].w,LW['c-plot-rtx'].h,dt,C.accent2,PLOT_MAX);
  drawInteg(document.getElementById('c-integ-raster').getContext('2d'),LW['c-integ-raster'].w,LW['c-integ-raster'].h,dr,bb,C.accent,PLOT_MAX);
  drawInteg(document.getElementById('c-integ-rtx').getContext('2d'),LW['c-integ-rtx'].w,LW['c-integ-rtx'].h,dt,bb,C.accent2,PLOT_MAX);

  document.getElementById('angle-display').textContent=(cameraAngle*180/Math.PI).toFixed(1)+'°';
  document.getElementById('final-raster').textContent=ir.toFixed(4);
  document.getElementById('final-rtx').textContent=it.toFixed(4);
  document.getElementById('final-diff').textContent=Math.abs(ir-it).toFixed(4);

  requestAnimationFrame(()=>{alignRows();requestAnimationFrame(buildConnectors);});
}

// =============================================
// INTERACTION
// =============================================
function getA(e){const r=c1.getBoundingClientRect(),cl=e.touches?e.touches[0]:e;return Math.atan2(cl.clientX-r.left-CX1,-(cl.clientY-r.top-CY1));}
function onHandle(e){const r=c1.getBoundingClientRect(),cl=e.touches?e.touches[0]:e;const mx=cl.clientX-r.left-CX1,my=cl.clientY-r.top-CY1;return Math.hypot(mx-Math.sin(cameraAngle)*CR,my+Math.cos(cameraAngle)*CR)<18;}
c1.addEventListener('mousedown',e=>{if(onHandle(e))dragging=true;});
c1.addEventListener('touchstart',e=>{e.preventDefault();if(onHandle(e))dragging=true;},{passive:false});
window.addEventListener('mousemove',e=>{if(!dragging)return;cameraAngle=getA(e);update();});
window.addEventListener('touchmove',e=>{if(!dragging)return;e.preventDefault();cameraAngle=getA(e);update();},{passive:false});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('touchend',()=>dragging=false);

window.addEventListener('load',()=>{
  // Apply render scale to all canvases
  if(RENDER_SCALE !== 1){
    document.querySelectorAll('canvas').forEach(c=>{
      const w=c.width, h=c.height;
      c.width = w * RENDER_SCALE;
      c.height = h * RENDER_SCALE;
      c.style.width = w + 'px';
      c.style.height = h + 'px';
      c.getContext('2d').scale(RENDER_SCALE, RENDER_SCALE);
    });
  }
  // sync toggle state with system default
  document.getElementById('theme-toggle').checked = (theme === 'light');
  document.body.classList.toggle('light', theme === 'light');
  applyTranslations();
  update();
});
</script>
